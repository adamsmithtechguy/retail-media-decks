<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bright.Blue · David Lloyd Connected Retail</title>
  <meta name="description" content="Milton Keynes Club Connected Retail 3-Month Pilot — Visual Concept and Partnership Tiers." />
  <meta property="og:title" content="Bright.Blue · David Lloyd Connected Retail" />
  <meta property="og:description" content="Milton Keynes Club Connected Retail 3-Month Pilot" />
  <meta property="og:image" content="slides/slide-01.jpg" />
  <style>
    :root {
      --bg: #050519;
      --ink: #ffffff;
      --accent: #7ee8ff;
      --muted: rgba(255, 255, 255, 0.55);
      --panel: rgba(13, 13, 33, 0.72);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "DM Sans", "Nunito", Arial, Helvetica, sans-serif;
      overflow: hidden;
    }
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(126, 232, 255, 0.08), transparent 55%),
        radial-gradient(ellipse 50% 40% at 90% 80%, rgba(126, 232, 255, 0.05), transparent 50%),
        var(--bg);
    }
    .frame {
      position: relative;
      width: min(96vw, calc(96vh * 16 / 9));
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      background: #0d0d21;
    }
    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 280ms ease;
      pointer-events: none;
    }
    .frame img.active { opacity: 1; }
    .chrome {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1.1rem;
      background: linear-gradient(to top, rgba(5, 5, 25, 0.92), rgba(5, 5, 25, 0));
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 200ms ease, transform 200ms ease;
      z-index: 5;
    }
    .stage:hover .chrome,
    .chrome:focus-within,
    .chrome.show { opacity: 1; transform: translateY(0); }
    .brand {
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      white-space: nowrap;
    }
    .brand strong { color: var(--accent); font-weight: 600; }
    .controls { display: flex; align-items: center; gap: 0.55rem; }
    button {
      appearance: none;
      border: 1px solid rgba(126, 232, 255, 0.28);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.45rem 0.85rem;
      font: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease;
    }
    button:hover { background: rgba(126, 232, 255, 0.12); border-color: var(--accent); }
    button:disabled { opacity: 0.35; cursor: default; }
    .counter {
      min-width: 3.5rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .hint {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      z-index: 5;
      opacity: 1;
      transition: opacity 400ms ease;
    }
    .hint.hide { opacity: 0; pointer-events: none; }
    @media (max-width: 720px) {
      .hint { display: none; }
      .brand { display: none; }
      .frame { width: 100vw; height: auto; max-height: 100vh; border-radius: 0; }
      .chrome { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="hint" id="hint">← → to navigate · F for fullscreen</div>
    <div class="frame" id="frame" aria-live="polite"></div>
    <div class="chrome show" id="chrome">
      <div class="brand"><strong>bright.blue</strong> · David Lloyd Connected Retail</div>
      <div class="controls">
        <button type="button" id="prev" aria-label="Previous slide">Prev</button>
        <div class="counter" id="counter">1 / 12</div>
        <button type="button" id="next" aria-label="Next slide">Next</button>
        <button type="button" id="fs" aria-label="Fullscreen">Fullscreen</button>
      </div>
    </div>
  </div>
  <script>
    const TOTAL = 12;
    const frame = document.getElementById('frame');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const fsBtn = document.getElementById('fs');
    const hint = document.getElementById('hint');
    const chrome = document.getElementById('chrome');

    const slides = [];
    for (let i = 1; i <= TOTAL; i++) {
      const img = document.createElement('img');
      img.src = `slides/slide-${String(i).padStart(2, '0')}.jpg`;
      img.alt = `Slide ${i}`;
      img.decoding = 'async';
      if (i === 1) img.loading = 'eager';
      else img.loading = 'lazy';
      frame.appendChild(img);
      slides.push(img);
    }

    let index = Math.max(0, Math.min(TOTAL - 1, (parseInt(location.hash.replace('#', ''), 10) || 1) - 1));

    function render() {
      slides.forEach((img, i) => img.classList.toggle('active', i === index));
      counter.textContent = `${index + 1} / ${TOTAL}`;
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === TOTAL - 1;
      history.replaceState(null, '', `#${index + 1}`);
    }

    function go(delta) {
      index = Math.max(0, Math.min(TOTAL - 1, index + delta));
      render();
      chrome.classList.add('show');
    }

    prevBtn.addEventListener('click', () => go(-1));
    nextBtn.addEventListener('click', () => go(1));
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        e.preventDefault(); go(1);
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault(); go(-1);
      } else if (e.key === 'Home') {
        e.preventDefault(); index = 0; render();
      } else if (e.key === 'End') {
        e.preventDefault(); index = TOTAL - 1; render();
      } else if (e.key.toLowerCase() === 'f') {
        e.preventDefault(); fsBtn.click();
      }
    });

    let touchX = null;
    frame.addEventListener('touchstart', (e) => { touchX = e.changedTouches[0].clientX; }, { passive: true });
    frame.addEventListener('touchend', (e) => {
      if (touchX == null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
      touchX = null;
    }, { passive: true });

    frame.addEventListener('click', (e) => {
      const mid = frame.getBoundingClientRect().left + frame.clientWidth / 2;
      go(e.clientX >= mid ? 1 : -1);
    });

    setTimeout(() => hint.classList.add('hide'), 3500);
    setTimeout(() => chrome.classList.remove('show'), 3500);

    render();
  </script>
</body>
</html>
