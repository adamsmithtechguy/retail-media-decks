<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bright.Blue · David Lloyd Connected Retail</title>
  <meta name="description" content="Milton Keynes Club Connected Retail 3-Month Pilot — Visual Concept and Partnership Tiers." />
  <meta property="og:title" content="Bright.Blue · David Lloyd Connected Retail" />
  <meta property="og:description" content="Milton Keynes Club Connected Retail 3-Month Pilot" />
  <meta property="og:image" content="https://adamsmithtechguy.github.io/retail-media-decks/david-lloyd/slides/slide-01.jpg" />
  <style>
    :root {
      --bg: #050519;
      --ink: #ffffff;
      --accent: #7ee8ff;
      --muted: rgba(255, 255, 255, 0.6);
      --panel: rgba(13, 13, 33, 0.92);
      --line: rgba(126, 232, 255, 0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .top {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(5, 5, 25, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 10;
    }
    .brand {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .brand strong { color: var(--accent); font-weight: 700; }
    .controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.55rem 1rem;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      min-width: 4.5rem;
    }
    button:hover { border-color: var(--accent); background: rgba(126, 232, 255, 0.12); }
    button:disabled { opacity: 0.35; cursor: default; }
    .counter {
      min-width: 4rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .stage {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      min-height: 0;
      position: relative;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .frame {
      width: min(100%, calc((100vh - 5.5rem) * 16 / 9));
      max-height: calc(100vh - 5.5rem);
      aspect-ratio: 16 / 9;
      background: #0d0d21;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      position: relative;
    }
    .frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0d0d21;
    }
    .nav-hit {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 28%;
      z-index: 2;
      background: transparent;
      border: 0;
      min-width: 0;
      border-radius: 0;
      padding: 0;
    }
    .nav-hit:hover { background: rgba(126, 232, 255, 0.04); border: 0; }
    .nav-hit.prev { left: 0; }
    .nav-hit.next { right: 0; }
    .hint {
      position: absolute;
      left: 50%;
      bottom: 1rem;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 0.4rem 0.85rem;
      pointer-events: none;
      z-index: 3;
      transition: opacity 0.4s ease;
    }
    .hint.hide { opacity: 0; }
    .error {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      z-index: 4;
      background: #0d0d21;
    }
    .error.show { display: flex; }
    @media (max-width: 640px) {
      .brand span { display: none; }
      button { min-width: 3.75rem; padding: 0.5rem 0.75rem; }
      .frame { border-radius: 0; width: 100%; max-height: none; height: auto; }
      .stage { padding: 0; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand"><strong>bright.blue</strong> <span>· David Lloyd Connected Retail</span></div>
    <div class="controls">
      <button type="button" id="prev">Prev</button>
      <div class="counter" id="counter">1 / 12</div>
      <button type="button" id="next">Next</button>
      <button type="button" id="fs">Full</button>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="frame" id="frame">
      <img id="slide" alt="Presentation slide" width="1440" height="810" />
      <button type="button" class="nav-hit prev" id="hitPrev" aria-label="Previous slide"></button>
      <button type="button" class="nav-hit next" id="hitNext" aria-label="Next slide"></button>
      <div class="hint" id="hint">Tap sides or use Prev / Next</div>
      <div class="error" id="error">Could not load slides. Check your connection and refresh.</div>
    </div>
  </main>

  <script>
    (function () {
      var TOTAL = 12;
      // Folder of this page — works with/without trailing slash or index.html
      var dir = location.pathname;
      if (/\.html?$/i.test(dir)) dir = dir.replace(/\/[^/]+$/, '/');
      else if (dir.slice(-1) !== '/') dir += '/';
      var BASE = location.origin + dir + 'slides/';
      var img = document.getElementById('slide');
      var counter = document.getElementById('counter');
      var prevBtn = document.getElementById('prev');
      var nextBtn = document.getElementById('next');
      var hitPrev = document.getElementById('hitPrev');
      var hitNext = document.getElementById('hitNext');
      var fsBtn = document.getElementById('fs');
      var hint = document.getElementById('hint');
      var error = document.getElementById('error');
      var index = 0;

      function slideUrl(i) {
        return BASE + 'slide-' + String(i + 1).padStart(2, '0') + '.jpg';
      }

      function preload(i) {
        if (i < 0 || i >= TOTAL) return;
        var pre = new Image();
        pre.src = slideUrl(i);
      }

      function render() {
        error.classList.remove('show');
        img.src = slideUrl(index);
        img.alt = 'Slide ' + (index + 1) + ' of ' + TOTAL;
        counter.textContent = (index + 1) + ' / ' + TOTAL;
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === TOTAL - 1;
        hitPrev.disabled = index === 0;
        hitNext.disabled = index === TOTAL - 1;
        try {
          history.replaceState(null, '', '#' + (index + 1));
        } catch (e) {}
        preload(index + 1);
        preload(index - 1);
      }

      function go(delta) {
        var next = index + delta;
        if (next < 0 || next >= TOTAL) return;
        index = next;
        render();
      }

      img.addEventListener('error', function () {
        error.classList.add('show');
      });
      img.addEventListener('load', function () {
        error.classList.remove('show');
      });

      prevBtn.addEventListener('click', function (e) { e.stopPropagation(); go(-1); });
      nextBtn.addEventListener('click', function (e) { e.stopPropagation(); go(1); });
      hitPrev.addEventListener('click', function (e) { e.stopPropagation(); go(-1); });
      hitNext.addEventListener('click', function (e) { e.stopPropagation(); go(1); });
      fsBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen && document.exitFullscreen();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
          e.preventDefault();
          go(1);
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
          e.preventDefault();
          go(-1);
        } else if (e.key === 'Home') {
          e.preventDefault();
          index = 0;
          render();
        } else if (e.key === 'End') {
          e.preventDefault();
          index = TOTAL - 1;
          render();
        } else if (e.key.toLowerCase() === 'f') {
          e.preventDefault();
          fsBtn.click();
        }
      });

      var touchX = null;
      document.getElementById('frame').addEventListener('touchstart', function (e) {
        touchX = e.changedTouches[0].clientX;
      }, { passive: true });
      document.getElementById('frame').addEventListener('touchend', function (e) {
        if (touchX == null) return;
        var dx = e.changedTouches[0].clientX - touchX;
        if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
        touchX = null;
      }, { passive: true });

      var hash = parseInt((location.hash || '').replace('#', ''), 10);
      if (hash >= 1 && hash <= TOTAL) index = hash - 1;

      render();
      setTimeout(function () { hint.classList.add('hide'); }, 4000);
    })();
  </script>
</body>
</html>
